# costmap_common_params.yaml

obstacle_layer:
  enabled: true
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    data_type: LaserScan
    topic: /scan  # Update with the correct laser scan topic
    marking: true
    clearing: true
    obstacle_range: 2.5
    raytrace_range: 3.0
    static_obstacles:
      - { x: 3.0, y: 2.0, z: 0.0, size: 0.2 }  # Mine 1 position
      - { x: -2.0, y: -1.0, z: 0.0, size: 0.2 }  # Mine 2 position
      - { x: 5.0, y: 0.0, z: 0.0, size: 0.2 }  # Mine 3 position
